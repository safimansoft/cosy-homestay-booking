<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kedai Sebelah Kanan</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;

    background:linear-gradient(
        135deg,
        #fff7c2,
        #ffd36b
    );

    animation:screenGlow 5s infinite;
}

.container{
    width:100%;
    height:100%;

    display:flex;
    flex-direction:column;

    justify-content:center;
    align-items:center;

    text-align:center;
}

.message{
    width:95%;

    color:#4b2600;

    background:white;

    border-radius:40px;

    padding:40px;

    box-shadow:0 0 30px rgba(255,180,0,0.5);

    animation:calmPulse 4s infinite;
}

.topText{
    font-size:8vw;
    font-weight:bold;
    line-height:1.2;
}

.bottomText{
    font-size:6vw;
    font-weight:bold;
    margin-top:15px;
}

.arrow{
    font-size:18vw;
    color:#ff5a00;

    margin-top:20px;

    animation:moveArrow 2s infinite;
}

.note{
    margin-top:20px;

    font-size:2vw;

    color:#5b3b00;
}

/* gentle pulse */
@keyframes calmPulse{

    0%,100%{
        transform:scale(1);
        opacity:1;
        box-shadow:0 0 25px rgba(255,180,0,0.5);
    }

    50%{
        transform:scale(1.04);
        opacity:0.8;
        box-shadow:0 0 70px rgba(255,180,0,0.9);
    }
}

/* moving arrow */
@keyframes moveArrow{

    0%,100%{
        transform:translateX(0);
    }

    50%{
        transform:translateX(50px);
    }
}

/* slow background glow */
@keyframes screenGlow{

    0%,100%{
        background:
        linear-gradient(
            135deg,
            #fff7c2,
            #ffd36b
        );
    }

    50%{
        background:
        linear-gradient(
            135deg,
            #fffce3,
            #ffe58a
        );
    }
}

.startButton{

    margin-top:30px;

    font-size:2.5vw;

    border:none;

    border-radius:20px;

    background:#ff8c00;

    color:white;

    padding:15px 35px;

    cursor:pointer;
}

.startButton:hover{
    opacity:0.9;
}

</style>
</head>

<body>

<div class="container">

    <div class="message">

        <div class="topText">
            KEDAI SEBELAH KANAN
        </div>

        <div class="arrow">
            ➜
        </div>

        <div class="bottomText">
            DI DEPAN
        </div>

    </div>

    <button class="startButton" onclick="startAudio()">
        🔊 AKTIFKAN BUNYI
    </button>

    <div class="note">
        Bunyi lembut setiap 20 saat
    </div>

</div>

<script>

let audioStarted=false;
let audioCtx;

function startAudio(){

    if(audioStarted) return;

    audioStarted=true;

    audioCtx=new(
        window.AudioContext ||
        window.webkitAudioContext
    )();

    playChime();

    setInterval(()=>{
        playChime();
    },20000);
}

function playChime(){

    const now=audioCtx.currentTime;

    const notes=[
        523.25,
        659.25,
        783.99
    ];

    notes.forEach((freq,index)=>{

        const osc=
        audioCtx.createOscillator();

        const gain=
        audioCtx.createGain();

        osc.type="sine";
        osc.frequency.value=freq;

        gain.gain.setValueAtTime(
            0,
            now+(index*0.2)
        );

        gain.gain.linearRampToValueAtTime(
            0.12,
            now+(index*0.2)+0.05
        );

        gain.gain.exponentialRampToValueAtTime(
            0.001,
            now+(index*0.2)+0.7
        );

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start(
            now+(index*0.2)
        );

        osc.stop(
            now+(index*0.2)+0.8
        );

    });
}

</script>

</body>
</html>
